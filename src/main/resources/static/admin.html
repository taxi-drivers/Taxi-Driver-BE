<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeDrive Admin</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #dfe3ea;
      --text: #172033;
      --muted: #687386;
      --primary: #195de6;
      --soft: #edf3ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 64px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 20px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      min-height: 54px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
    }

    button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      padding: 0 12px;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: #fbfcfe;
    }

    tr:hover td {
      background: #fbfcff;
    }

    .mono {
      font-variant-numeric: tabular-nums;
    }

    .muted {
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      margin: 0 4px 4px 0;
    }

    .detail {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .field {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 10px;
      font-size: 13px;
    }

    .field strong {
      color: var(--muted);
      font-size: 12px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    pre {
      margin: 0;
      padding: 10px;
      background: #f3f5f8;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
    }

    .error {
      margin: 20px 28px 0;
      padding: 12px 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #be123c;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>SafeDrive Admin</h1>
    <button class="primary" id="refreshButton">새로고침</button>
  </header>

  <div id="error" class="error"></div>

  <main>
    <section>
      <div class="section-head">
        <div>
          <div class="section-title">유저 목록</div>
          <div class="muted" id="userCount">-</div>
        </div>
      </div>
      <div id="users"></div>
    </section>

    <section>
      <div class="section-head">
        <div class="section-title">유저 상세 / 설문 이력</div>
      </div>
      <div id="detail" class="empty">유저를 선택하세요.</div>
    </section>
  </main>

  <script>
    const usersEl = document.querySelector('#users');
    const detailEl = document.querySelector('#detail');
    const userCountEl = document.querySelector('#userCount');
    const errorEl = document.querySelector('#error');
    const refreshButton = document.querySelector('#refreshButton');

    const formatDate = (value) => {
      if (!value) return '-';
      return new Date(value).toLocaleString('ko-KR');
    };

    const showError = (message) => {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    };

    const clearError = () => {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    };

    const requestJson = async (url) => {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`);
      }
      return response.json();
    };

    const renderBadges = (items) => {
      if (!items || items.length === 0) return '<span class="muted">없음</span>';
      return items
        .map((item) => `<span class="badge">${item.name ?? item.code ?? item}</span>`)
        .join('');
    };

    const renderUsers = (users) => {
      userCountEl.textContent = `${users.length}명`;
      if (users.length === 0) {
        usersEl.innerHTML = '<div class="empty">등록된 유저가 없습니다.</div>';
        return;
      }

      usersEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>이메일</th>
              <th>닉네임</th>
              <th>숙련도</th>
              <th>취약특성</th>
              <th>설문</th>
              <th>가입일</th>
            </tr>
          </thead>
          <tbody>
            ${users.map((user) => `
              <tr data-user-id="${user.user_id}">
                <td class="mono">${user.user_id}</td>
                <td>${user.email}</td>
                <td>${user.nickname ?? '-'}</td>
                <td class="mono">${user.skill_level ?? '-'}</td>
                <td>${renderBadges(user.vulnerability_types)}</td>
                <td class="mono">${user.survey_history_count}</td>
                <td class="mono">${formatDate(user.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      usersEl.querySelectorAll('tr[data-user-id]').forEach((row) => {
        row.addEventListener('click', () => loadDetail(row.dataset.userId));
      });
    };

    const renderDetail = (user, histories) => {
      detailEl.className = 'detail';
      detailEl.innerHTML = `
        <div class="field"><strong>ID</strong><span class="mono">${user.user_id}</span></div>
        <div class="field"><strong>이메일</strong><span>${user.email}</span></div>
        <div class="field"><strong>닉네임</strong><span>${user.nickname ?? '-'}</span></div>
        <div class="field"><strong>숙련도</strong><span class="mono">${user.skill_level ?? '-'}</span></div>
        <div class="field"><strong>취약특성</strong><span>${renderBadges(user.vulnerability_types)}</span></div>
        <div class="field"><strong>설문 이력</strong><span class="mono">${user.survey_history_count}건</span></div>
        <div class="field"><strong>최신 설문</strong><span class="mono">${formatDate(user.latest_survey_at)}</span></div>
        <div class="field"><strong>가입일</strong><span class="mono">${formatDate(user.created_at)}</span></div>
        <hr>
        <div class="section-title">설문 제출 기록</div>
        ${
          histories.length === 0
            ? '<div class="empty">설문 이력이 없습니다.</div>'
            : histories.map((history) => `
              <div class="history-item">
                <div><strong>#${history.survey_history_id}</strong> <span class="muted">${formatDate(history.created_at)}</span></div>
                <div>버전: <span class="mono">${history.survey_version}</span></div>
                <div>숙련도: <span class="mono">${history.skill_level}</span></div>
                <div>취약특성 ID: <span class="mono">${history.vulnerability_type_ids.join(', ') || '-'}</span></div>
                <pre>${JSON.stringify(history.answers ?? {}, null, 2)}</pre>
              </div>
            `).join('')
        }
      `;
    };

    const loadUsers = async () => {
      clearError();
      usersEl.innerHTML = '<div class="empty">불러오는 중...</div>';
      try {
        const data = await requestJson('/api/admin/users');
        renderUsers(data.users ?? []);
      } catch (error) {
        usersEl.innerHTML = '<div class="empty">유저 목록을 불러오지 못했습니다.</div>';
        showError(`유저 목록 조회 실패: ${error.message}`);
      }
    };

    const loadDetail = async (userId) => {
      clearError();
      detailEl.className = 'empty';
      detailEl.textContent = '불러오는 중...';
      try {
        const [user, history] = await Promise.all([
          requestJson(`/api/admin/users/${userId}`),
          requestJson(`/api/admin/users/${userId}/survey-history`)
        ]);
        renderDetail(user, history.histories ?? []);
      } catch (error) {
        detailEl.textContent = '유저 상세를 불러오지 못했습니다.';
        showError(`유저 상세 조회 실패: ${error.message}`);
      }
    };

    refreshButton.addEventListener('click', loadUsers);
    loadUsers();
  </script>
</body>
</html>
